# Same structure as _data/links.yml — same instructions for editing in that file too.

# Each top-level item is a category shown as a heading on /links/.
# Add a new link by copying an "items" block and filling in the three fields.
# Add a new category by copying a whole "- category: ..." block.
#
# Indentation matters in YAML — copy-pasting an existing block and editing
# the text is much safer than typing a new one from scratch.

- category: "Source document: Word"
  items:
    - title: Some title
      url: https://example.com
      description: Delete this placeholder once you have a real link to add.

- category: "Source document: LaTeX"
  items:
    - title: Some other title
      url: https://example.com
      description: Delete this placeholder once you have a real link to add.

- category: "Quarto resources"
  items:
    - title: SMSN Quarto Workshop Templates and Materials
      url: https://tdhc153.github.io/smsn-quarto-workshop/
      description: See Quarto templates for book and slides (Tom Coleman, University of St Andrews)
